# Top-level demo config. Pick an env via Hydra group:
#   python scripts/run_planner.py env=base_motion3d mode=sim
#
# `mode` is a plain string field rather than its own group — each env
# yaml exposes `pipelines.{fake,sim,real}` and the demo selects the
# right one with `cfg.env.pipelines[cfg.mode]`. Adding a new env is one
# new file under conf/env/; no code changes.

defaults:
  - _self_
  - env: ???
  - lab: prpl

hydra:
  run:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}

mode: fake
seed: 0
max_eval_steps: 100

# BilevelPlanningAgent knobs (per-env overrides allowed inside env yamls).
agent:
  max_abstract_plans: 10
  samples_per_step: 3
  max_skill_horizon: 100
  heuristic_name: hff
  planning_timeout: 60

# Trajectory recording. The per-tick state, real-env frame and shadow-sim
# frame are always written to ${hydra:runtime.output_dir}/trajectory/ — that
# data is cheap to keep and useful for replay / debugging / paper figures.
# `record.video=true` additionally composes a side-by-side (real | shadow)
# mp4 from those frames at the end of the rollout. The shadow sim is the
# env's own sim pipeline (`cfg.env.pipelines.sim.real_env`), re-instantiated
# alongside the active real_env regardless of which mode the run is in.
record:
  video: false
  fps: 10

# Plan preview gate. When true and `mode=real`, after the agent finishes
# planning (and before the executor starts driving the real env), the
# planned trajectory is rendered through the shadow sim into a
# `preview.mp4` under the rollout log dir, and the rollout pauses for
# operator approval via stdin. Type `y` to execute, anything else to abort
# cleanly. Defaults to on as a hardware-safety gate; restricted to
# `mode=real` in pipeline.py so sim / fake / test runs don't block on
# stdin. Override either way on the command line:
#   `preview.enabled=false` to skip the prompt before a real-mode rollout
#   (unattended demos), or set `preview.enabled=true mode=sim` if you
#   want a preview for a non-real-mode rollout too.
preview:
  enabled: true
  fps: 10
