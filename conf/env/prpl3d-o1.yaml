# kinder/PrplLab3D-o1-v0 — pick/place one cube in the lab.
# Bilevel-planning env model lives in
# kinder_bilevel_planning.env_models.kinematic3d.prpl3d.

env_name: prpl3d
make_kwargs:
  id: kinder/PrplLab3D-o1-v0
env_model_kwargs:
  num_objects: 1

pipelines:
  fake:
    real_env:
      _target_: prpl_tidybot.real_env.RealTidyBotEnv
      # FakeInterface stores commanded poses, so the executor converges on
      # the first tick; skip the per-tick sleep to keep tests fast.
      control_period: 0.0
      interface:
        _target_: prpl_tidybot.interfaces.interface.FakeInterface
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.kinematic3d.PrplLab3DPerceiver
      num_cubes: 1
    plan_executor:
      _target_: prpl_tidybot.real_sim.plan_executors.kinematic3d.PurePursuitKinematic3DPlanExecutor
  sim:
    real_env:
      _target_: prpl_tidybot.sim_env.KinderSimEnv
      env_id: ${env.make_kwargs.id}
      # Enable inner-env `set_state` so this same pipeline can serve as
      # a shadow sim for the side-by-side video recorder.
      allow_state_access: true
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.passthrough.PassThroughPerceiver
    plan_executor:
      _target_: prpl_tidybot.real_sim.plan_executors.passthrough.PassThroughPlanExecutor
  real:
    real_env:
      _target_: prpl_tidybot.real_env.RealTidyBotEnv
      interface:
        _target_: prpl_tidybot.interfaces.interface.RealInterface
        base_interface:
          _target_: prpl_tidybot.interfaces.base_interface.RealBaseInterface
          marker_detector_host: ${lab.marker_detector_host}
    perceiver: ${env.pipelines.fake.perceiver}
    plan_executor: ${env.pipelines.fake.plan_executor}
