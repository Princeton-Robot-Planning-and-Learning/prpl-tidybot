# kinder/BaseMotion3D-v0 — the robot reaches a target base pose.
# Bilevel-planning env model lives in
# kinder_bilevel_planning.env_models.kinematic3d.base_motion3d.

env_name: base_motion3d
make_kwargs:
  id: kinder/BaseMotion3D-v0
env_model_kwargs: {}

# Used by the fake/real perceiver: where the agent thinks the target is.
# (Sim mode reads the target from the kinder env directly, ignoring this.)
target_pose: [1.0, 1.0, 0.2]

pipelines:
  fake:
    real_env:
      _target_: prpl_tidybot.real_env.RealTidyBotEnv
      # FakeInterface converges in one inner iteration; skip the sleep.
      control_period: 0.0
      interface:
        _target_: prpl_tidybot.interfaces.interface.FakeInterface
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.kinematic3d.BaseMotion3DPerceiver
      target_pose: ${env.target_pose}
    action_grounder:
      _target_: prpl_tidybot.real_sim.action_grounders.kinematic3d.Kinematic3DActionGrounder
  sim:
    real_env:
      _target_: prpl_tidybot.sim_env.KinderSimEnv
      env_id: ${env.make_kwargs.id}
      # Enable inner-env `set_state` so this same pipeline can serve as
      # a shadow sim for the side-by-side video recorder.
      allow_state_access: true
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.passthrough.PassThroughPerceiver
    action_grounder:
      _target_: prpl_tidybot.real_sim.action_grounders.passthrough.PassThroughActionGrounder
  real:
    real_env:
      _target_: prpl_tidybot.real_env.RealTidyBotEnv
      interface:
        _target_: prpl_tidybot.interfaces.interface.RealInterface
        # This rollout doesn't read or move the arm, so swap in the
        # fake arm interface and skip the real-hardware path entirely.
        arm_interface:
          _target_: prpl_tidybot.interfaces.arm_interface.FakeArmInterface
    perceiver: ${env.pipelines.fake.perceiver}
    action_grounder: ${env.pipelines.fake.action_grounder}
