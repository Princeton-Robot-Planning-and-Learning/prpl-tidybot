# kinder/BaseMotion3D-v0 — the robot reaches a target base pose.
# Bilevel-planning env model lives in
# kinder_bilevel_planning.env_models.kinematic3d.base_motion3d.

env_name: base_motion3d
make_kwargs:
  id: kinder/BaseMotion3D-v0
env_model_kwargs: {}

# Used by the fake-mode target source: where the agent thinks the target is.
# (Sim mode reads the target from the kinder env directly; real mode pulls it
# from the marker detector and ignores this constant.)
target_pose: [1.0, 1.0, 0.2]

# ArUco marker (and its z value in the env frame) that the real-mode perceiver
# reads as the target. The marker detector must be configured to publish
# this ID — see `prpl_tidybot.marker_detector.constants.TARGET_MARKER_IDS`.
target_marker_id: 23
target_marker_z: 0.0

pipelines:
  fake:
    real_env:
      _target_: prpl_tidybot.real_env.RealTidyBotEnv
      # FakeInterface stores commanded poses, so the executor converges on
      # the first tick; skip the per-tick sleep to keep tests fast.
      control_period: 0.0
      interface:
        _target_: prpl_tidybot.interfaces.interface.FakeInterface
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.kinematic3d.BaseMotion3DPerceiver
      target_source:
        _target_: prpl_tidybot.real_sim.perceivers.target_source.ConstantTargetSource
        x: ${env.target_pose.0}
        y: ${env.target_pose.1}
        z: ${env.target_pose.2}
    plan_executor:
      _target_: prpl_tidybot.real_sim.plan_executors.kinematic3d.PurePursuitKinematic3DPlanExecutor
  sim:
    real_env:
      _target_: prpl_tidybot.sim_env.KinderSimEnv
      env_id: ${env.make_kwargs.id}
      # Enable inner-env `set_state` so this same pipeline can serve as
      # a shadow sim for the side-by-side video recorder.
      allow_state_access: true
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.passthrough.PassThroughPerceiver
    plan_executor:
      _target_: prpl_tidybot.real_sim.plan_executors.passthrough.PassThroughPlanExecutor
  real:
    real_env:
      _target_: prpl_tidybot.real_env.RealTidyBotEnv
      interface:
        _target_: prpl_tidybot.interfaces.interface.RealInterface
        # This rollout doesn't read or move the arm and doesn't look at images,
        # so swap in the fake arm and camera interfaces; get_observation()
        # otherwise hits the real wrist/base cameras which aren't wired up yet.
        arm_interface:
          _target_: prpl_tidybot.interfaces.arm_interface.FakeArmInterface
        camera_interface:
          _target_: prpl_tidybot.interfaces.camera_interface.FakeCameraInterface
        base_interface:
          _target_: prpl_tidybot.interfaces.base_interface.RealBaseInterface
          marker_detector_host: ${lab.marker_detector_host}
      # Off-host render source: subscribes to the JPEG image publisher running
      # inside the marker-detector daemon. Lets `record.video_path=...` work
      # on the real pipeline without the on-robot base camera being wired up.
      renderer:
        _target_: prpl_tidybot.rendering.CeilingCameraRenderer
    perceiver:
      _target_: prpl_tidybot.real_sim.perceivers.kinematic3d.BaseMotion3DPerceiver
      target_source:
        _target_: prpl_tidybot.real_sim.perceivers.target_source.MarkerDetectorTargetSource
        marker_id: ${env.target_marker_id}
        target_z: ${env.target_marker_z}
    plan_executor: ${env.pipelines.fake.plan_executor}
