name: prpl-tidybot
root: <%= ENV['PRPL_REPO_DIR'] || '~/prpl-tidybot' %>
<% branch = (@args && @args[0]) || '' %>
<% lab = ENV['PRPL_LAB'] || 'prpl' %>
<% nuc_default    = lab == 'fwing' ? 'tidybot-nuc'    : 'tidybot-nuc-prpl' %>
<% laptop_default = lab == 'fwing' ? 'tidybot-laptop' : 'tidybot-laptop-prpl' %>

# Override the SSH targets and remote repo path via env vars before
# launching, e.g.
#
#   PRPL_LAB=prpl tmuxinator local
#
# Pass a branch name as a positional argument to check out (and
# fast-forward) the same branch on every remote pane before the servers
# start, e.g.
#
#   tmuxinator local my-feature-branch
#
# See README.md for prerequisites (passwordless SSH, tmuxinator install).

windows:
  - prpl-tidybot:
      # `tiled` gives a 2-up grid with the wide bottom pane (the planner)
      # taking the full width — handy for typing.
      layout: tiled
      panes:
        - PRPL_BRANCH="<%= branch %>" ./scripts/run_remote.sh "${PRPL_NUC_HOST:-<%= nuc_default %>}" bash
        - PRPL_BRANCH="<%= branch %>" ./scripts/run_remote.sh "${PRPL_NUC_HOST:-<%= nuc_default %>}"
          python -m prpl_tidybot.third_party.base_server
        - PRPL_BRANCH="<%= branch %>" ./scripts/run_remote.sh "${PRPL_PERCEPTION_HOST:-<%= laptop_default %>}"
          python scripts/run_marker_detector_server.py<%= lab == 'fwing' ? '' : ' --lab prpl' %>
        - PRPL_BRANCH="<%= branch %>" ./scripts/run_remote.sh "${PRPL_NUC_HOST:-<%= nuc_default %>}"
          python -m prpl_tidybot.third_party.arm_server
